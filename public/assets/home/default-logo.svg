<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 暖色渐变系列 -->
    <linearGradient id="warm1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7E5F" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FEB47B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF7E5F" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="warm2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#FFA07A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="warm3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF8C42" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="warm4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9A5A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF6F61" stop-opacity="0.9"/>
    </linearGradient>
    <!-- 微光滤镜 -->
    <filter id="warmGlow" x="-0.02" y="-0.02" width="1.04" height="1.04">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#FFB57C" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 完全透明背景 -->

  <!-- 四个大字：每个字都有独特设计，粗+暖+透明 -->
  <g transform="translate(50, 200)">
    <!-- 浪：左侧加一道暖色波浪切割线 -->
    <text x="0" y="0" font-size="160" font-weight="900" font-family="'Segoe UI', 'Helvetica Neue', 'Microsoft YaHei', sans-serif" fill="url(#warm1)" filter="url(#warmGlow)">浪</text>
    <path d="M30,-20 Q60,-40 90,-20" stroke="#FFA07A" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.7"/>
    
    <!-- 颜：右上角加小圆点，像脸颊暖光 -->
    <text x="170" y="0" font-size="160" font-weight="900" font-family="'Segoe UI', 'Helvetica Neue', 'Microsoft YaHei', sans-serif" fill="url(#warm2)" filter="url(#warmGlow)">颜</text>
    <circle cx="270" cy="-40" r="14" fill="#FFB347" opacity="0.8"/>
    
    <!-- 博：左侧加一道暖色竖线，拉长视觉 -->
    <text x="340" y="0" font-size="160" font-weight="900" font-family="'Segoe UI', 'Helvetica Neue', 'Microsoft YaHei', sans-serif" fill="url(#warm3)" filter="url(#warmGlow)">博</text>
    <rect x="330" y="-70" width="8" height="120" fill="#FF9A5A" opacity="0.6" rx="4"/>
    
    <!-- 客：右下角加暖色小点，平衡构图 -->
    <text x="510" y="0" font-size="160" font-weight="900" font-family="'Segoe UI', 'Helvetica Neue', 'Microsoft YaHei', sans-serif" fill="url(#warm4)" filter="url(#warmGlow)">客</text>
    <circle cx="620" cy="40" r="12" fill="#FF8C42" opacity="0.7"/>
  </g>

  <!-- 暖色光晕点缀，增加氛围但不抢眼 -->
  <circle cx="200" cy="80" r="50" fill="#FFB57C" opacity="0.1"/>
  <circle cx="750" cy="220" r="60" fill="#FF9A5A" opacity="0.08"/>
  <circle cx="850" cy="60" r="40" fill="#FF6B6B" opacity="0.06"/>
</svg>